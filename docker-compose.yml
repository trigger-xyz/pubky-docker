services:
  # 1. Pkarr server
  pkarr:
    container_name: pkarr
    image: "${REGISTRY:-synonymsoft}/pkarr:${PKARR_TAG:-latest}"
    build:
      context: ../pkarr
    volumes:
      - ./pkarr.config.toml:/config.toml
      - .storage/pkarr:/cache
    command: pkarr-relay --config=/config.toml
    networks:
      pubky:
        ipv4_address: "172.18.0.2"
    ports:
      - 6882:6882
    profiles:
      - pkarr

  # 2 Pubky Homeserver
  # 2.1 Postgresql for Homeserver
  postgres:
    container_name: postgres
    image: postgres:17-alpine
    restart: always
    networks:
      pubky:
        ipv4_address: "172.18.0.9"
    volumes:
      - .storage/postgres/data:/var/lib/postgresql/data
    env_file:
      - ./.env
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2.2 Pubky Homeserver
  homeserver:
    container_name: homeserver
    image: "${REGISTRY:-synonymsoft}/homeserver:${HOMESERVER_TAG:-latest}"
    restart: always
    build:
      context: ../pubky-core
    volumes:
      - ./homeserver.config.toml:/config.toml
      - ./homeserver.entrypoint.sh:/entrypoint.sh
    env_file:
      - ./.env
    entrypoint: [ "/bin/sh", "-c", "/entrypoint.sh" ]
    networks:
      pubky:
        ipv4_address: "172.18.0.4"
    ports:
      - 6287:6287
      - 6286:6286
      - 6288:6288
      - 15411:15411
      - 15412:15412
    depends_on:
      pkarr:
        condition: "service_started"
        required: false
      postgres:
        condition: service_healthy


  # 3 Nexus
  # 3.1 Pubky Nexus Daemon
  nexusd:
    container_name: nexusd
    image: "${REGISTRY:-synonymsoft}/pubky-nexus:${PUBKY_NEXUS_TAG:-latest}"
    build:
      context: ../pubky-nexus
    # Simplified internal config path
    command: nexusd --config-dir=/config
    volumes:
      # Mount static files path
      - .storage/static:/static
      # Mount the config file
      - ./pubky-nexus-config-${NETWORK:-testnet}.toml:/config/config.toml
    ports:
      - 8080:8080
      - 8081:8081
    networks:
      pubky:
        ipv4_address: "172.18.0.3"
    depends_on:
      - nexus-neo4j
      - nexus-redis

  # 3.2 Pubky Nexus Graph
  nexus-neo4j:
    image: neo4j:5.26.7-community
    container_name: nexus-neo4j
    restart: unless-stopped
    ports:
      - 7474:7474
      - 7687:7687
    networks:
      pubky:
        ipv4_address: "172.18.0.5"
    volumes:
      # Mount the neo4j configuration file to container
      - .storage/neo4j/conf:/conf
      # Mount the data to container
      - .storage/neo4j/data:/data
      - .storage/neo4j/logs:/logs
      - ./pubky-nexus/docker/db-graph:/db-graph
    env_file:
      - ./neo4j.env

  # 3.3 Pubky Nexus Index
  nexus-redis:
    image: redis/redis-stack:7.2.0-v11
    container_name: nexus-redis
    ports:
      - 6379:6379
      - 8001:8001 # Redis Insight http://localhost:8001/
    networks:
      pubky:
        ipv4_address: "172.18.0.6"
    volumes:
      - .storage/redis/data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    restart: always

  # 4. Pubky.app Social UI
  client:
    container_name: client
    image: "${REGISTRY:-synonymsoft}/pubky-app-${NETWORK:-testnet}:${PUBKY_APP_TAG:-latest}"
    build:
      context: ../pubky-app
      args:
        NEXT_PUBLIC_HOMESERVER: ${NEXT_PUBLIC_HOMESERVER:-8pinxxgqs41n4aididenw5apqp1urfmzdztr8jt4abrkdn435ewo}
        NEXT_PUBLIC_NEXUS: ${NEXT_PUBLIC_NEXUS:-http://localhost:8080}
        NEXT_PUBLIC_TESTNET: ${NEXT_PUBLIC_TESTNET:-true}
        NEXT_PUBLIC_DEFAULT_HTTP_RELAY: ${HTTP_RELAY:-http://localhost:15412/link/}
        NEXT_PUBLIC_PKARR_RELAYS: ${NEXT_PUBLIC_PKARR_RELAYS:-["https://pkarr.pubky.app","https://pkarr.pubky.org"]} # Ignored when using Testnet
        NEXT_ENABLE_PLAUSIBLE: ${NEXT_ENABLE_PLAUSIBLE:-false}
    env_file:
      - ./.env
    command: [ "npm", "run", "serve:prod" ]
    networks:
      pubky:
        ipv4_address: "172.18.0.7"
    ports:
      - 4200:4200

  # 5. Franky Social UI (replacement for pubky-app)
  franky:
    container_name: franky
    image: "${REGISTRY:-synonymdev}/franky:${FRANKY_TAG:-latest}"
    build:
      context: ../franky
      args:
        NEXT_PUBLIC_DB_VERSION: ${NEXT_PUBLIC_DB_VERSION:-2}
        NEXT_PUBLIC_DB_NAME: ${NEXT_PUBLIC_DB_NAME:-franky}
        NEXT_PUBLIC_DEBUG_MODE: ${NEXT_PUBLIC_DEBUG_MODE:-false}
        NEXT_PUBLIC_SYNC_TTL: ${NEXT_PUBLIC_SYNC_TTL:-300000}
        NEXT_PUBLIC_NOTIFICATION_POLL_INTERVAL_MS: ${NEXT_PUBLIC_NOTIFICATION_POLL_INTERVAL_MS:-8888}
        NEXT_PUBLIC_NOTIFICATION_POLL_ON_START: ${NEXT_PUBLIC_NOTIFICATION_POLL_ON_START:-false}
        NEXT_PUBLIC_NOTIFICATION_RESPECT_PAGE_VISIBILITY: ${NEXT_PUBLIC_NOTIFICATION_RESPECT_PAGE_VISIBILITY:-true}
        NEXT_PUBLIC_STREAM_POLL_INTERVAL_MS: ${NEXT_PUBLIC_STREAM_POLL_INTERVAL_MS:-8888}
        NEXT_PUBLIC_STREAM_POLL_ON_START: ${NEXT_PUBLIC_STREAM_POLL_ON_START:-false}
        NEXT_PUBLIC_STREAM_RESPECT_PAGE_VISIBILITY: ${NEXT_PUBLIC_STREAM_RESPECT_PAGE_VISIBILITY:-true}
        NEXT_PUBLIC_STREAM_FETCH_LIMIT: ${NEXT_PUBLIC_STREAM_FETCH_LIMIT:-10}
        NEXT_PUBLIC_STREAM_CACHE_MAX_AGE_MS: ${NEXT_PUBLIC_STREAM_CACHE_MAX_AGE_MS:-300000}
        NEXT_MAX_STREAM_TAGS: ${NEXT_MAX_STREAM_TAGS:-5}
        NEXT_PUBLIC_TTL_POST_MS: ${NEXT_PUBLIC_TTL_POST_MS:-300000}
        NEXT_PUBLIC_TTL_USER_MS: ${NEXT_PUBLIC_TTL_USER_MS:-600000}
        NEXT_PUBLIC_TTL_BATCH_INTERVAL_MS: ${NEXT_PUBLIC_TTL_BATCH_INTERVAL_MS:-5000}
        NEXT_PUBLIC_TTL_POST_MAX_BATCH_SIZE: ${NEXT_PUBLIC_TTL_POST_MAX_BATCH_SIZE:-20}
        NEXT_PUBLIC_TTL_USER_MAX_BATCH_SIZE: ${NEXT_PUBLIC_TTL_USER_MAX_BATCH_SIZE:-20}
        NEXT_PUBLIC_TTL_RETRY_DELAY_MS: ${NEXT_PUBLIC_TTL_RETRY_DELAY_MS:-60000}
        NEXT_PUBLIC_HOMESERVER: ${NEXT_PUBLIC_HOMESERVER:-8pinxxgqs41n4aididenw5apqp1urfmzdztr8jt4abrkdn435ewo}
        NEXT_PUBLIC_NEXUS_URL: ${NEXT_PUBLIC_NEXUS_URL:-http://localhost:8080}
        NEXT_PUBLIC_CDN_URL: ${NEXT_PUBLIC_CDN_URL:-}
        NEXT_PUBLIC_TESTNET: ${NEXT_PUBLIC_TESTNET:-true}
        NEXT_PUBLIC_PKARR_RELAYS: ${NEXT_PUBLIC_PKARR_RELAYS:-["https://pkarr.pubky.app","https://pkarr.pubky.org"]}
        NEXT_PUBLIC_DEFAULT_HTTP_RELAY: ${NEXT_PUBLIC_DEFAULT_HTTP_RELAY:-http://localhost:15412/link/}
        NEXT_PUBLIC_EXCHANGE_RATE_API: ${NEXT_PUBLIC_EXCHANGE_RATE_API:-https://api1.blocktank.to/api/fx/rates/btc}
        NEXT_PUBLIC_HOMEGATE_URL: ${NEXT_PUBLIC_HOMEGATE_URL:-https://homegate.staging.pubky.app}
        NEXT_PUBLIC_MODERATION_ID: ${NEXT_PUBLIC_MODERATION_ID:-euwmq57zefw5ynnkhh37b3gcmhs7g3cptdbw1doaxj1pbmzp3wro}
        NEXT_PUBLIC_MODERATED_TAGS: ${NEXT_PUBLIC_MODERATED_TAGS:-["nudity"]}
        BASE_URL_SUPPORT: ${BASE_URL_SUPPORT:-https://support.pubky.app}
        SUPPORT_API_ACCESS_TOKEN: ${SUPPORT_API_ACCESS_TOKEN:-test-token}
        SUPPORT_ACCOUNT_ID: ${SUPPORT_ACCOUNT_ID:-1}
        SUPPORT_FEEDBACK_INBOX_ID: ${SUPPORT_FEEDBACK_INBOX_ID:-0}
    env_file:
      - ./.env
    networks:
      pubky:
        ipv4_address: "172.18.0.8"
    ports:
      - 3000:3000

networks:
  pubky:
    driver: bridge
    enable_ipv6: false
    ipam:
      driver: default
      config:
        - subnet: 172.18.0.0/16

volumes:
  backend_storage:
